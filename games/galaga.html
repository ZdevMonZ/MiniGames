<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>GALAGA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      touch-action: none;
      overflow: hidden;
    }
    #back-btn {
      background: rgba(255,224,102,0.15);
      border: 1.5px solid rgba(255,224,102,0.4);
      border-radius: 8px;
      color: rgba(255,224,102,0.9);
      font-size: 12px;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      padding: 5px 10px;
      cursor: pointer;
      letter-spacing: 1px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #back-btn:active { background: rgba(255,224,102,0.3); }
    #hud {
      width: 100%;
      max-width: 420px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      font-weight: bold;
      letter-spacing: 1px;
    }
    #hud .score-label { color: #fff; font-size: 11px; }
    #hud .score-val   { font-size: 22px; color: #88CCFF; }
    #lives { display: flex; gap: 3px; align-items: center; }
    canvas {
      display: block;
      max-width: 420px;
      width: 100%;
      touch-action: none;
    }
    #controls {
      width: 100%;
      max-width: 420px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 28px;
    }
    .ctrl-btn {
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.18);
      border-radius: 50%;
      width: 62px; height: 62px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      color: rgba(255,255,255,0.65);
      cursor: pointer;
      user-select: none; -webkit-user-select: none;
    }
    .ctrl-btn:active { background: rgba(255,255,255,0.18); }
    #btn-fire {
      background: rgba(255,60,60,0.18);
      border-color: rgba(255,80,80,0.45);
      font-size: 13px; font-weight: bold;
      font-family: 'Courier New', monospace;
      color: rgba(255,140,140,0.9);
      letter-spacing: 1px;
      width: 68px; height: 68px;
    }
    #btn-fire:active { background: rgba(255,60,60,0.38); }
    #overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,10,0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Courier New', monospace;
      z-index: 10;
    }
    #overlay h1 {
      font-size: 46px; letter-spacing: 6px;
      color: #88CCFF;
      text-shadow: 0 0 20px #4488FF, 0 0 40px #4488FF;
      margin-bottom: 8px;
    }
    #overlay .sub { font-size: 12px; color: #555; margin-bottom: 32px; letter-spacing: 3px; }
    #overlay .btn {
      background: #88CCFF; color: #000; border: none;
      padding: 14px 40px; font-size: 16px; font-weight: bold;
      font-family: inherit; letter-spacing: 2px;
      border-radius: 8px; cursor: pointer;
    }
    #overlay .btn:active { transform: scale(0.97); }
    #overlay .hi { font-size: 13px; color: #555; margin-top: 16px; }
    #msg {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #FFE066; font-size: 26px; font-weight: bold;
      letter-spacing: 3px; text-shadow: 0 0 14px #FFE066;
      pointer-events: none; z-index: 8;
      opacity: 0; transition: opacity 0.3s;
      text-align: center; white-space: nowrap;
    }
  </style>
</head>
<body>

<div id="hud">
  <button id="back-btn" onclick="window.location.href='../index.html'">← HOME</button>
  <div><div class="score-label">SCORE</div><div class="score-val" id="scoreVal">0</div></div>
  <div><div class="score-label">HI-SCORE</div><div class="score-val" id="hiVal">0</div></div>
  <div id="lives"></div>
</div>

<canvas id="c"></canvas>
<div id="msg"></div>

<div id="controls">
  <div class="ctrl-btn" id="btn-left">◀</div>
  <div class="ctrl-btn" id="btn-fire">FIRE</div>
  <div class="ctrl-btn" id="btn-right">▶</div>
</div>

<div id="overlay">
  <h1>GALAGA</h1>
  <div class="sub">ZEPETO WORLD</div>
  <button class="btn" id="startBtn">START GAME</button>
  <div class="hi" id="overlayHi"></div>
</div>

<script>
// ── CANVAS ────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const DW = 360;

function resize() {
  const w = Math.min(window.innerWidth, 420);
  canvas.width  = w;
  canvas.height = Math.min(w * 1.45, window.innerHeight - 160);
}
resize();
window.addEventListener('resize', resize);

const S   = () => canvas.width / DW;
const CDH = () => canvas.height / S();

// ── CONSTANTS ─────────────────────────────────────────────────────────
const COLS = 8, ROWS = 4;
const EW = 22, EH = 18, EGX = 10, EGY = 10;
const FORM_W  = COLS * EW + (COLS - 1) * EGX;  // 246
const FORM_OX = (DW - FORM_W) / 2 + EW / 2;    // 68
const FORM_OY = 52;
const PLAYER_SPEED = 3.2;
const BULLET_SPEED = 9;
const EBULLET_SPEED = 2.6;

const ECOLS = {
  boss:      ['#FF3366','#FF88AA'],
  butterfly: ['#FF9900','#FFCC55'],
  bee:       ['#44FF77','#AAFFCC'],
};

// ── STATE ─────────────────────────────────────────────────────────────
let gameState = 'idle';
let score, hiScore, lives, wave;
let player, bullets, eBullets, enemies, particles;
let shootCD, eshootTimer, diveTimer, frameCount;
let fmOffset, fmDir;

// Static star field
const STARS = Array.from({length: 70}, (_, i) => ({
  x: (i * 137.508) % 360,
  y: (i * 97.31)   % 600,
  r: i % 4 === 0 ? 1.4 : 0.8,
}));

// ── INIT ──────────────────────────────────────────────────────────────
function startGame() {
  score   = 0;
  lives   = 3;
  wave    = 1;
  hiScore = parseInt(localStorage.getItem('galaga_hi') || '0');
  document.getElementById('overlay').style.display = 'none';
  startWave();
  updateHUD();
}

function startWave() {
  fmOffset    = 0;
  fmDir       = 1;
  bullets     = [];
  eBullets    = [];
  particles   = [];
  shootCD     = 0;
  eshootTimer = 100;
  diveTimer   = 180;
  frameCount  = 0;

  player = {
    x: DW / 2, y: CDH() - 52,
    w: 26, h: 20, inv: 0, alive: true,
  };

  enemies = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const hx = FORM_OX + c * (EW + EGX);
      const hy = FORM_OY + r * (EH + EGY);
      enemies.push({
        hx, hy,
        x: hx, y: -30 - r * 20 - c * 6,
        row: r, col: c,
        type: r === 0 ? 'boss' : r === 1 ? 'butterfly' : 'bee',
        alive: true,
        entering: true,
        diving: false, diveVx: 0, diveVy: 0, diveShot: false,
        returning: false,
      });
    }
  }
}

// ── DRAW ──────────────────────────────────────────────────────────────
function drawBg() {
  ctx.fillStyle = '#00000E';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (const st of STARS) {
    const twinkle = Math.sin(frameCount * 0.05 + st.x * 0.1) > 0.65 ? 1.8 : st.r;
    ctx.globalAlpha = 0.35 + twinkle * 0.25;
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(st.x * S(), (st.y % CDH()) * S(), twinkle, twinkle);
  }
  ctx.globalAlpha = 1;
}

function drawPlayer() {
  const p = player;
  if (!p.alive) return;
  if (p.inv > 0 && Math.floor(p.inv / 5) % 2 === 1) return;
  const s = S(), x = p.x * s, y = p.y * s;
  const hw = p.w * s / 2, hh = p.h * s / 2;

  // engine glow
  const pulse = 0.5 + 0.5 * Math.sin(frameCount * 0.3);
  ctx.fillStyle = `rgba(100,200,255,${pulse * 0.5})`;
  ctx.beginPath();
  ctx.ellipse(x, y + hh + 3 * s, hw * 0.4, hh * 0.4, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = `rgba(255,160,60,${pulse * 0.8})`;
  ctx.beginPath();
  ctx.ellipse(x, y + hh + 1 * s, hw * 0.18, hh * 0.28 * pulse, 0, 0, Math.PI * 2);
  ctx.fill();

  // ship body
  ctx.fillStyle = '#4499BB';
  ctx.beginPath();
  ctx.moveTo(x,         y - hh);
  ctx.lineTo(x - hw,    y + hh);
  ctx.lineTo(x - hw * 0.22, y + hh * 0.15);
  ctx.lineTo(x,         y + hh * 0.4);
  ctx.lineTo(x + hw * 0.22, y + hh * 0.15);
  ctx.lineTo(x + hw,    y + hh);
  ctx.closePath();
  ctx.fill();

  // highlight
  ctx.fillStyle = '#99DDFF';
  ctx.beginPath();
  ctx.moveTo(x,          y - hh);
  ctx.lineTo(x - hw * 0.22, y);
  ctx.lineTo(x,          y + hh * 0.2);
  ctx.lineTo(x + hw * 0.22, y);
  ctx.closePath();
  ctx.fill();

  // cockpit
  ctx.fillStyle = '#DDFAFF';
  ctx.beginPath();
  ctx.ellipse(x, y - hh * 0.2, hw * 0.13, hh * 0.22, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawEnemy(e) {
  if (!e.alive) return;
  const s = S(), x = e.x * s, y = e.y * s;
  const [c1, c2] = ECOLS[e.type];
  const hw = EW * s / 2, hh = EH * s / 2;
  const fl = Math.floor(frameCount / 14) % 2; // wing flap

  ctx.save();
  ctx.translate(x, y);

  if (e.type === 'boss') {
    ctx.fillStyle = c1;
    ctx.beginPath();
    ctx.ellipse(-hw * 0.58, -hh * 0.1, hw * 0.48, hh * 0.5 + fl * s, -0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse( hw * 0.58, -hh * 0.1, hw * 0.48, hh * 0.5 + fl * s,  0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = c2;
    ctx.beginPath();
    ctx.ellipse(-hw * 0.5, hh * 0.28, hw * 0.36, hh * 0.28, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse( hw * 0.5, hh * 0.28, hw * 0.36, hh * 0.28,-0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(0, 0, hw * 0.18, hh * 0.44, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = c1;
    ctx.beginPath();
    ctx.arc(-hw * 0.08, -hh * 0.08, 2 * s, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath();
    ctx.arc( hw * 0.08, -hh * 0.08, 2 * s, 0, Math.PI * 2); ctx.fill();

  } else if (e.type === 'butterfly') {
    ctx.fillStyle = c1;
    ctx.beginPath();
    ctx.ellipse(-hw * 0.44, 0, hw * 0.44 + fl * s, hh * 0.48, -0.15, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse( hw * 0.44, 0, hw * 0.44 + fl * s, hh * 0.48,  0.15, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = c2;
    ctx.beginPath();
    ctx.ellipse(0, 0, hw * 0.2, hh * 0.42, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-hw * 0.09, -hh * 0.1, 1.8 * s, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( hw * 0.09, -hh * 0.1, 1.8 * s, 0, Math.PI * 2); ctx.fill();

  } else { // bee
    const spread = fl ? hw * 0.52 : hw * 0.46;
    ctx.fillStyle = c1;
    ctx.beginPath();
    ctx.ellipse(-spread, -hh * 0.1, spread, hh * 0.28, -0.1, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse( spread, -hh * 0.1, spread, hh * 0.28,  0.1, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = c2;
    ctx.beginPath();
    ctx.moveTo(0, -hh * 0.5);
    ctx.lineTo(hw * 0.28, hh * 0.5);
    ctx.lineTo(-hw * 0.28, hh * 0.5);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = c1;
    ctx.beginPath();
    ctx.moveTo(0, -hh * 0.12);
    ctx.lineTo(hw * 0.24, hh * 0.5);
    ctx.lineTo(-hw * 0.24, hh * 0.5);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-hw * 0.09, -hh * 0.18, 1.6 * s, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( hw * 0.09, -hh * 0.18, 1.6 * s, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

function drawBullets() {
  const s = S();
  for (const b of bullets) {
    ctx.fillStyle = 'rgba(255,224,102,0.3)';
    ctx.fillRect(b.x * s - 4, b.y * s - 10, 8, 18);
    ctx.fillStyle = '#FFE066';
    ctx.fillRect(b.x * s - 2, b.y * s - 8, 4, 14);
  }
  for (const b of eBullets) {
    ctx.fillStyle = 'rgba(255,68,102,0.3)';
    ctx.beginPath();
    ctx.arc(b.x * s, b.y * s, 5 * s, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FF4466';
    ctx.beginPath();
    ctx.arc(b.x * s, b.y * s, 3 * s, 0, Math.PI * 2); ctx.fill();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.col;
    ctx.beginPath();
    ctx.arc(p.x * S(), p.y * S(), p.r * S(), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function draw() {
  drawBg();
  if (gameState === 'idle' || gameState === 'gameover') return;
  drawParticles();
  for (const e of enemies) drawEnemy(e);
  drawBullets();
  drawPlayer();
}

// ── UPDATE ────────────────────────────────────────────────────────────
function burst(x, y, col, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 1 + Math.random() * 3;
    particles.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 0.5,
      r: 1 + Math.random() * 2, col,
      life: 25 + Math.random() * 20, maxLife: 45,
    });
  }
}

function update() {
  if (gameState !== 'playing') return;
  frameCount++;
  const dh = CDH();
  const fmSpeed = 0.45 + wave * 0.07;

  // ── formation bounds check ─────────────────────────────────────────
  const formed = enemies.filter(e => e.alive && !e.diving && !e.entering && !e.returning);
  if (formed.length) {
    let minX = Infinity, maxX = -Infinity;
    for (const e of formed) {
      const nx = e.hx + fmOffset + fmDir * fmSpeed;
      if (nx - EW / 2 < minX) minX = nx - EW / 2;
      if (nx + EW / 2 > maxX) maxX = nx + EW / 2;
    }
    if (minX < 6 || maxX > DW - 6) fmDir *= -1;
  }
  fmOffset += fmDir * fmSpeed;

  // ── entry + formation positions ───────────────────────────────────
  for (const e of enemies) {
    if (!e.alive || e.diving || e.returning) continue;
    if (e.entering) {
      e.y += 3.5;
      e.x  = e.hx + fmOffset;
      if (e.y >= e.hy) { e.y = e.hy; e.entering = false; }
    } else {
      e.x = e.hx + fmOffset;
      e.y = e.hy;
    }
  }

  // ── dive trigger ──────────────────────────────────────────────────
  diveTimer--;
  if (diveTimer <= 0) {
    diveTimer = Math.max(55, 170 - wave * 12);
    const pool = enemies.filter(e => e.alive && !e.entering && !e.diving && !e.returning);
    if (pool.length) {
      const diver = pool[Math.floor(Math.random() * pool.length)];
      diver.diving  = true;
      diver.diveShot = false;
      const spd = 2.8 + wave * 0.25;
      const dx  = player.x - diver.x;
      const dy  = dh + 30 - diver.y;
      const d   = Math.hypot(dx, dy);
      diver.diveVx = (dx / d) * spd;
      diver.diveVy = (dy / d) * spd;
    }
  }

  // ── update divers ────────────────────────────────────────────────
  for (const e of enemies) {
    if (!e.alive) continue;
    if (e.diving) {
      // slight tracking toward player
      const pull = (player.x - e.x) * 0.004;
      e.diveVx = Math.max(-5, Math.min(5, e.diveVx + pull));
      e.x += e.diveVx;
      e.y += e.diveVy;
      if (e.x < EW/2) { e.x = EW/2; e.diveVx = Math.abs(e.diveVx); }
      if (e.x > DW - EW/2) { e.x = DW - EW/2; e.diveVx = -Math.abs(e.diveVx); }
      if (!e.diveShot && e.y > player.y - 50 && e.y < player.y + 20) {
        eBullets.push({ x: e.x, y: e.y + EH/2, vy: EBULLET_SPEED + wave * 0.2 });
        e.diveShot = true;
      }
      if (e.y > dh + EH) {
        e.diving = false; e.returning = true;
        e.x = e.hx + fmOffset; e.y = -EH;
      }
    } else if (e.returning) {
      e.y += 4.5;
      e.x = e.hx + fmOffset;
      if (e.y >= e.hy) { e.y = e.hy; e.returning = false; }
    }
  }

  // ── player movement ───────────────────────────────────────────────
  if (player.alive) {
    if (keys.left)  player.x = Math.max(player.w/2,      player.x - PLAYER_SPEED);
    if (keys.right) player.x = Math.min(DW - player.w/2, player.x + PLAYER_SPEED);
    if (player.inv > 0) player.inv--;
  }

  // ── player shoot ──────────────────────────────────────────────────
  if (shootCD > 0) shootCD--;
  if (keys.fire && shootCD === 0 && player.alive) {
    bullets.push({ x: player.x, y: player.y - player.h/2 });
    shootCD = 16;
  }

  // ── move bullets ──────────────────────────────────────────────────
  bullets  = bullets.filter(b => { b.y -= BULLET_SPEED; return b.y > -15; });
  eBullets = eBullets.filter(b => { b.y += b.vy;        return b.y < dh + 10; });

  // ── enemy shoot timer ─────────────────────────────────────────────
  eshootTimer--;
  if (eshootTimer <= 0) {
    eshootTimer = Math.max(22, 90 - wave * 7);
    const alive = enemies.filter(e => e.alive && !e.entering);
    if (alive.length) {
      const sh = alive[Math.floor(Math.random() * alive.length)];
      eBullets.push({ x: sh.x, y: sh.y + EH/2, vy: EBULLET_SPEED + wave * 0.2 });
    }
  }

  // ── particles ─────────────────────────────────────────────────────
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
    return p.life > 0;
  });

  // ── bullet vs enemy ───────────────────────────────────────────────
  for (const b of bullets) {
    for (const e of enemies) {
      if (!e.alive) continue;
      if (Math.abs(b.x - e.x) < EW * 0.55 && Math.abs(b.y - e.y) < EH * 0.55) {
        e.alive = false;
        b.y = -9999;
        const pts   = e.type === 'boss' ? 400 : e.type === 'butterfly' ? 200 : 100;
        const bonus = e.diving ? 100 : 0;
        score += pts + bonus;
        if (score > hiScore) { hiScore = score; localStorage.setItem('galaga_hi', hiScore); }
        updateHUD();
        burst(e.x, e.y, ECOLS[e.type][0], 10);
        if (bonus) showMsg('+' + (pts + bonus));
      }
    }
  }
  bullets = bullets.filter(b => b.y > -20);

  // ── enemy bullet vs player ────────────────────────────────────────
  if (player.alive && player.inv === 0) {
    for (const b of eBullets) {
      if (Math.abs(b.x - player.x) < player.w * 0.38 &&
          Math.abs(b.y - player.y) < player.h * 0.45) {
        b.y = 9999;
        hitPlayer(); break;
      }
    }
  }

  // ── diving enemy body vs player ───────────────────────────────────
  if (player.alive && player.inv === 0) {
    for (const e of enemies) {
      if (!e.alive || (!e.diving && !e.returning)) continue;
      if (Math.abs(e.x - player.x) < (EW + player.w) * 0.34 &&
          Math.abs(e.y - player.y) < (EH + player.h) * 0.34) {
        e.alive = false;
        burst(e.x, e.y, ECOLS[e.type][0], 8);
        hitPlayer();
      }
    }
  }

  // ── wave clear ────────────────────────────────────────────────────
  if (enemies.every(e => !e.alive)) {
    gameState = 'wave-clear';
    wave++;
    showMsg('WAVE ' + wave);
    setTimeout(() => {
      startWave();
      player.y = CDH() - 52;
      gameState = 'playing';
    }, 1800);
  }
}

function hitPlayer() {
  lives--;
  updateHUD();
  burst(player.x, player.y, '#88DDFF', 14);
  if (lives <= 0) {
    player.alive = false;
    gameState = 'gameover';
    setTimeout(() => {
      const ov = document.getElementById('overlay');
      ov.querySelector('h1').textContent   = 'GAME OVER';
      ov.querySelector('.sub').textContent = 'SCORE: ' + score;
      document.getElementById('startBtn').textContent   = 'PLAY AGAIN';
      document.getElementById('overlayHi').textContent  = 'HI-SCORE: ' + hiScore;
      ov.style.display = 'flex';
    }, 1400);
  } else {
    player.inv = 120;
  }
}

// ── HUD ───────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('hiVal').textContent    = hiScore;
  const el = document.getElementById('lives');
  el.innerHTML = '';
  for (let i = 0; i < lives; i++) {
    const s = document.createElement('span');
    s.textContent = '▲';
    s.style.cssText = 'color:#88CCFF;font-size:14px;margin:0 1px;';
    el.appendChild(s);
  }
}

let msgTO;
function showMsg(t) {
  const el = document.getElementById('msg');
  el.textContent = t; el.style.opacity = 1;
  clearTimeout(msgTO);
  msgTO = setTimeout(() => el.style.opacity = 0, 1000);
}

// ── LOOP ──────────────────────────────────────────────────────────────
let lastTS = 0;
function loop(ts = 0) {
  if (ts - lastTS >= 16) { update(); draw(); lastTS = ts; }
  requestAnimationFrame(loop);
}

// ── INPUT ─────────────────────────────────────────────────────────────
const keys = { left: false, right: false, fire: false };

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft'  || e.key === 'a') keys.left  = true;
  if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
  if (e.key === ' ' || e.key === 'ArrowUp') { keys.fire = true; e.preventDefault(); }
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft'  || e.key === 'a') keys.left  = false;
  if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
  if (e.key === ' ' || e.key === 'ArrowUp') keys.fire = false;
});

[['btn-left','left'],['btn-right','right'],['btn-fire','fire']].forEach(([id, k]) => {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', e => { e.preventDefault(); keys[k] = true;  }, {passive:false});
  el.addEventListener('touchend',   e => { e.preventDefault(); keys[k] = false; }, {passive:false});
  el.addEventListener('mousedown',  () => keys[k] = true);
  el.addEventListener('mouseup',    () => keys[k] = false);
  el.addEventListener('mouseleave', () => keys[k] = false);
});

document.getElementById('startBtn').addEventListener('click', () => {
  startGame(); gameState = 'playing';
});

(function init() {
  const hi = localStorage.getItem('galaga_hi');
  if (hi) document.getElementById('overlayHi').textContent = 'HI-SCORE: ' + hi;
  loop();
})();
</script>
