<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>지뢰찾기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  min-height: 100%;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  font-family: 'Segoe UI', system-ui, sans-serif;
  touch-action: none;
  user-select: none;
  overflow-x: hidden;
  overflow-y: auto;
}
#app {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 12px 8px 20px;
  width: 100%;
  max-width: 450px;
}
#hud {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 0 2px;
}
#hud-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.pill {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 7px 15px;
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 7px;
}

/* ── Home button ── */
#home-btn {
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.18);
  border-radius: 20px;
  color: rgba(255,255,255,0.75);
  font-size: 12px; font-weight: 700;
  padding: 7px 14px; cursor: pointer;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  white-space: nowrap; flex-shrink: 0;
}
#home-btn:hover { background: rgba(0,212,255,0.18); border-color: rgba(0,212,255,0.5); color: #fff; }

/* ── Classic minesweeper LCD HUD ── */
#ms-hud {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.13);
  border-radius: 14px;
  padding: 8px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.lcd {
  background: #0a0a14;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px;
  padding: 4px 8px;
  font-family: 'Courier New', monospace;
  font-size: 20px;
  font-weight: 700;
  color: #ff4444;
  letter-spacing: 2px;
  min-width: 54px;
  text-align: center;
  text-shadow: 0 0 8px rgba(255,68,68,0.5);
}
#lcd-time { color: #44ff88; text-shadow: 0 0 8px rgba(68,255,136,0.5); }
#smiley-btn {
  font-size: 26px;
  cursor: pointer;
  background: none;
  border: none;
  line-height: 1;
  padding: 0 4px;
  transition: transform 0.1s;
}
#smiley-btn:hover { transform: scale(1.15); }
#smiley-btn:active { transform: scale(0.9); }

/* ── Flag mode button ── */
#flag-btn {
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.18);
  border-radius: 20px;
  color: rgba(255,255,255,0.75);
  font-size: 12px; font-weight: 700;
  padding: 7px 14px; cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap; flex-shrink: 0;
}
#flag-btn.active {
  background: rgba(255,183,0,0.22);
  border-color: rgba(255,183,0,0.6);
  color: #ffc933;
}
#flag-btn:hover { background: rgba(255,183,0,0.15); border-color: rgba(255,183,0,0.45); }

/* ── Board wrap ── */
#board-wrap { position: relative; }

/* ── CSS Grid board ── */
#board {
  display: grid;
  gap: 2px;
  padding: 8px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.13);
  border-radius: 10px;
  touch-action: none;
}
.cell {
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.08s, transform 0.06s;
  position: relative;
  font-size: 13px;
  line-height: 1;
}
/* Hidden cell: 3D raised look */
.cell.hidden {
  background: linear-gradient(145deg, rgba(255,255,255,0.13), rgba(255,255,255,0.04));
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: inset 1px 1px 0 rgba(255,255,255,0.15), inset -1px -1px 0 rgba(0,0,0,0.3);
}
.cell.hidden:hover {
  background: linear-gradient(145deg, rgba(255,255,255,0.2), rgba(255,255,255,0.09));
  transform: scale(0.95);
}
.cell.hidden:active { transform: scale(0.88); }
/* Revealed empty */
.cell.revealed {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  cursor: default;
}
/* Flagged */
.cell.flagged {
  background: linear-gradient(145deg, rgba(255,183,0,0.18), rgba(255,183,0,0.07));
  border: 1px solid rgba(255,183,0,0.35);
  box-shadow: inset 1px 1px 0 rgba(255,255,255,0.12), inset -1px -1px 0 rgba(0,0,0,0.25);
}
/* Mine revealed */
.cell.mine-hit {
  background: rgba(255,60,60,0.35);
  border: 1px solid rgba(255,60,60,0.6);
}
.cell.mine-show {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  cursor: default;
}
/* Wrong flag on loss */
.cell.wrong-flag {
  background: rgba(255,60,60,0.2);
  border: 1px solid rgba(255,60,60,0.4);
}

/* ── Overlay base ── */
#overlay {
  position: fixed;
  inset: 0;
  border-radius: 0;
  background: rgba(10,6,35,0.93);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  z-index: 100;
}
.ov-title {
  font-size: 32px; font-weight: 900; color: #fff;
  letter-spacing: 5px;
  text-shadow: 0 0 30px rgba(120,100,255,0.45);
}
.ov-sub {
  font-size: 14px; color: rgba(255,255,255,0.5);
  text-align: center; line-height: 1.75;
}

/* ── Difficulty list ── */
.diff-list {
  display: flex; flex-direction: column; gap: 10px; width: 256px;
}
.diff-btn {
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.13);
  border-radius: 14px; color: #fff;
  padding: 13px 17px; cursor: pointer;
  display: flex; align-items: center; gap: 14px;
  text-align: left; width: 100%;
  transition: transform 0.15s, background 0.15s, border-color 0.15s;
}
.diff-btn:hover                { transform: translateX(5px); }
.diff-btn.d-easy:hover { background: rgba(56,195,90,0.17);  border-color: rgba(56,195,90,0.55); }
.diff-btn.d-mid:hover  { background: rgba(255,183,0,0.17);  border-color: rgba(255,183,0,0.55); }
.diff-btn.d-hard:hover { background: rgba(255,82,82,0.17);  border-color: rgba(255,82,82,0.55); }
.diff-dot {
  width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0;
}
.d-easy .diff-dot { background: #38c35a; box-shadow: 0 0 8px rgba(56,195,90,0.7); }
.d-mid  .diff-dot { background: #ffb700; box-shadow: 0 0 8px rgba(255,183,0,0.7); }
.d-hard .diff-dot { background: #ff5252; box-shadow: 0 0 8px rgba(255,82,82,0.7); }
.diff-txt { display: flex; flex-direction: column; gap: 2px; }
.diff-name { font-size: 15px; font-weight: 700; }
.diff-desc { font-size: 12px; color: rgba(255,255,255,0.45); }

/* ── Generic buttons ── */
.btn {
  padding: 10px 26px; border-radius: 50px;
  border: 1.5px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.08); color: #fff;
  font-size: 14px; font-weight: 700; cursor: pointer;
  transition: all 0.18s;
}
.btn:hover { background: rgba(0,212,255,0.2); border-color: #00d4ff; }
.btn-g { background: linear-gradient(135deg, #667eea, #764ba2); border: none; }
.btn-g:hover { opacity: 0.87; transform: scale(1.04); }
.btn-sm { font-size: 12px; padding: 7px 18px; }

/* ── Result overlay ── */
.ov-badge { font-size: 42px; font-weight: 900; letter-spacing: 2px; }
.c-win  { color: #00d4ff; text-shadow: 0 0 28px rgba(0,212,255,0.75); }
.c-lose { color: #ff6b6b; text-shadow: 0 0 22px rgba(255,107,107,0.55); }
.ov-stats {
  font-size: 13px; color: rgba(255,255,255,0.55);
  text-align: center; line-height: 1.9;
}
.ov-best { color: #ffd93d; font-weight: 700; }

/* ── Number colors ── */
.n1 { color: #4fc3f7; }
.n2 { color: #81c784; }
.n3 { color: #e57373; }
.n4 { color: #7986cb; }
.n5 { color: #ff8a65; }
.n6 { color: #4dd0e1; }
.n7 { color: #f06292; }
.n8 { color: #bdbdbd; }
</style>
</head>
<body>
<div id="app">
  <!-- Top HUD -->
  <div id="hud">
    <div id="hud-top">
      <button id="home-btn" onclick="window.location.href='../index.html'">← HOME</button>
      <button id="flag-btn" onclick="toggleFlagMode()">🚩 깃발</button>
    </div>
    <div id="ms-hud">
      <div class="lcd" id="lcd-mines">000</div>
      <button id="smiley-btn" onclick="restartSame()">😊</button>
      <div class="lcd" id="lcd-time">000</div>
    </div>
  </div>
  <!-- Board -->
  <div id="board-wrap">
    <div id="board"></div>
    <div id="overlay"></div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────
const CONFIGS = {
  easy:   { rows: 9,  cols: 9,  mines: 10, label: '초급', lsKey: 'ms_best_easy' },
  medium: { rows: 12, cols: 12, mines: 25, label: '중급', lsKey: 'ms_best_medium' },
  hard:   { rows: 16, cols: 16, mines: 45, label: '고급', lsKey: 'ms_best_hard' }
};

// ── Number color classes ──────────────────────────────────────
const NUM_CLASS = ['','n1','n2','n3','n4','n5','n6','n7','n8'];

// ── DOM ──────────────────────────────────────────────────────
const boardEl    = document.getElementById('board');
const OV         = document.getElementById('overlay');
const lcdMines   = document.getElementById('lcd-mines');
const lcdTime    = document.getElementById('lcd-time');
const smileyBtn  = document.getElementById('smiley-btn');
const flagBtn    = document.getElementById('flag-btn');

// ── Game state ───────────────────────────────────────────────
let difficulty  = 'easy';
let cfg         = CONFIGS.easy;
let cells       = [];      // flat array of cell objects
let cellEls     = [];      // flat array of DOM elements
let boardGenerated = false;
let gameOver    = false;
let gameWon     = false;
let flagMode    = false;
let firstClick  = true;
let mineCount   = 0;       // remaining (mines - flags)
let elapsedSec  = 0;
let timerID     = null;
let longPressTimer = null;
let longPressFired = false;

// ── Cell state object ─────────────────────────────────────────
// { mine, adj, revealed, flagged }

// ── Sizing ───────────────────────────────────────────────────
function calcCellSize(cols) {
  const appPad   = 16;               // #app padding 8px × 2
  const boardPad = 16;               // #board padding 8px × 2
  const gaps     = 2 * (cols - 1);   // 2px gap × (cols-1)
  const avail    = Math.min(window.innerWidth, 450) - appPad - boardPad - gaps;
  return Math.max(18, Math.min(36, Math.floor(avail / cols)));
}

// ── LCD display ──────────────────────────────────────────────
function lcdFmt(n) {
  const v = Math.max(0, Math.min(999, Math.floor(n)));
  return String(v).padStart(3, '0');
}

function updateLCD() {
  lcdMines.textContent = lcdFmt(mineCount);
  lcdTime.textContent  = lcdFmt(elapsedSec);
}

// ── Timer ─────────────────────────────────────────────────────
function startTimer() {
  if (timerID) return;
  timerID = setInterval(() => {
    if (!gameOver) { elapsedSec++; updateLCD(); }
  }, 1000);
}

function stopTimer() {
  if (timerID) { clearInterval(timerID); timerID = null; }
}

function resetTimer() {
  stopTimer();
  elapsedSec = 0;
  updateLCD();
}

// ── Flag mode toggle ──────────────────────────────────────────
function toggleFlagMode() {
  flagMode = !flagMode;
  flagBtn.classList.toggle('active', flagMode);
  flagBtn.textContent = flagMode ? '🚩 ON' : '🚩 깃발';
}

// ── Board generation (deferred to first click) ─────────────────
function generateBoard(safeIdx) {
  const { rows, cols, mines } = cfg;
  const total = rows * cols;

  // Determine safe zone: index itself + neighbors
  const safeSet = new Set();
  safeSet.add(safeIdx);
  const sr = Math.floor(safeIdx / cols);
  const sc = safeIdx % cols;
  for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
    const nr = sr + dr, nc = sc + dc;
    if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
      safeSet.add(nr * cols + nc);
    }
  }

  // Build candidate mine positions (everything not in safe zone)
  const candidates = [];
  for (let i = 0; i < total; i++) if (!safeSet.has(i)) candidates.push(i);

  // Fisher-Yates shuffle candidates and take first `mines` positions
  for (let i = candidates.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
  }

  // If not enough non-safe cells for mines, allow some safe zone overlap (edge case on tiny board)
  const mineSet = new Set(candidates.slice(0, mines));

  // Assign mines
  for (let i = 0; i < total; i++) {
    cells[i].mine = mineSet.has(i);
  }

  // Calculate adjacency counts
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (cells[r * cols + c].mine) { cells[r * cols + c].adj = 0; continue; }
      let cnt = 0;
      for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && cells[nr * cols + nc].mine) cnt++;
      }
      cells[r * cols + c].adj = cnt;
    }
  }

  boardGenerated = true;
}

// ── Flood fill reveal ─────────────────────────────────────────
function floodReveal(startIdx) {
  const { rows, cols } = cfg;
  const queue = [startIdx];
  const visited = new Set([startIdx]);

  while (queue.length > 0) {
    const idx = queue.shift();
    const cell = cells[idx];
    if (cell.revealed || cell.flagged) continue;
    cell.revealed = true;
    renderCell(idx);

    if (cell.adj === 0 && !cell.mine) {
      const r = Math.floor(idx / cols);
      const c = idx % cols;
      for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
          const ni = nr * cols + nc;
          if (!visited.has(ni) && !cells[ni].revealed && !cells[ni].flagged) {
            visited.add(ni);
            queue.push(ni);
          }
        }
      }
    }
  }
}

// ── Reveal a cell ─────────────────────────────────────────────
function revealCell(idx) {
  if (gameOver) return;
  const cell = cells[idx];
  if (cell.revealed || cell.flagged) return;

  // First click: generate board ensuring safety
  if (!boardGenerated) {
    generateBoard(idx);
    startTimer();
    firstClick = false;
  }

  if (cell.mine) {
    // Hit a mine — game over
    cell.revealed = true;
    stopTimer();
    gameOver = true;
    smileyBtn.textContent = '😵';
    revealAllMines(idx);
    setTimeout(() => showLoseOverlay(), 600);
    return;
  }

  floodReveal(idx);
  checkWin();
}

// ── Flag a cell ───────────────────────────────────────────────
function flagCell(idx) {
  if (gameOver) return;
  const cell = cells[idx];
  if (cell.revealed) return;
  cell.flagged = !cell.flagged;
  mineCount += cell.flagged ? -1 : 1;
  updateLCD();
  renderCell(idx);
}

// ── Render a single cell ──────────────────────────────────────
function renderCell(idx) {
  const el = cellEls[idx];
  const cell = cells[idx];
  el.className = 'cell';
  el.textContent = '';

  if (!cell.revealed && !cell.flagged) {
    el.classList.add('hidden');
  } else if (!cell.revealed && cell.flagged) {
    el.classList.add('flagged');
    el.textContent = '🚩';
  } else if (cell.revealed && cell.mine) {
    // mine was revealed
    el.classList.add('mine-show');
    el.textContent = '💣';
  } else if (cell.revealed && !cell.mine) {
    el.classList.add('revealed');
    if (cell.adj > 0) {
      el.textContent = cell.adj;
      el.classList.add(NUM_CLASS[cell.adj]);
    }
  }
}

// ── Reveal all mines on loss ──────────────────────────────────
function revealAllMines(hitIdx) {
  const { rows, cols } = cfg;
  const total = rows * cols;
  for (let i = 0; i < total; i++) {
    const cell = cells[i];
    const el   = cellEls[i];
    if (i === hitIdx) {
      // The mine that was hit
      el.className = 'cell mine-hit';
      el.textContent = '💣';
    } else if (cell.mine && !cell.flagged) {
      el.className = 'cell mine-show';
      el.textContent = '💣';
    } else if (!cell.mine && cell.flagged) {
      // Wrong flag
      el.className = 'cell wrong-flag';
      el.textContent = '❌';
    }
  }
}

// ── Check win condition ───────────────────────────────────────
function checkWin() {
  const { rows, cols, mines } = cfg;
  const total = rows * cols;
  let revealedCount = 0;
  for (let i = 0; i < total; i++) {
    if (cells[i].revealed) revealedCount++;
  }
  if (revealedCount === total - mines) {
    gameOver = true;
    gameWon  = true;
    stopTimer();
    smileyBtn.textContent = '😎';
    // Auto-flag remaining mines
    for (let i = 0; i < total; i++) {
      if (cells[i].mine && !cells[i].flagged) {
        cells[i].flagged = true;
        renderCell(i);
      }
    }
    mineCount = 0;
    updateLCD();
    // Save best time
    const key = cfg.lsKey;
    const prev = localStorage.getItem(key);
    if (prev === null || elapsedSec < parseInt(prev)) {
      localStorage.setItem(key, elapsedSec);
    }
    setTimeout(() => showWinOverlay(), 600);
  }
}

// ── Build board DOM ───────────────────────────────────────────
function buildBoard() {
  const { rows, cols, mines } = cfg;
  const total  = rows * cols;
  const cSize  = calcCellSize(cols);

  boardEl.style.gridTemplateColumns = `repeat(${cols}, ${cSize}px)`;
  boardEl.innerHTML = '';
  cells   = [];
  cellEls = [];

  for (let i = 0; i < total; i++) {
    cells.push({ mine: false, adj: 0, revealed: false, flagged: false });

    const el = document.createElement('div');
    el.className = 'cell hidden';
    el.style.width  = cSize + 'px';
    el.style.height = cSize + 'px';
    el.style.fontSize = Math.max(10, Math.floor(cSize * 0.52)) + 'px';

    // Click: reveal or flag depending on mode
    el.addEventListener('click', (e) => {
      e.preventDefault();
      if (longPressFired) { longPressFired = false; return; }
      if (flagMode) flagCell(i);
      else revealCell(i);
    });

    // Right-click: flag (desktop)
    el.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      flagCell(i);
    });

    // Long-press: flag (mobile, 600ms)
    el.addEventListener('touchstart', (e) => {
      longPressFired = false;
      longPressTimer = setTimeout(() => {
        longPressFired = true;
        flagCell(i);
        // Subtle haptic if supported
        if (navigator.vibrate) navigator.vibrate(30);
      }, 600);
    }, { passive: true });

    el.addEventListener('touchend', () => {
      clearTimeout(longPressTimer);
    });
    el.addEventListener('touchmove', () => {
      clearTimeout(longPressTimer);
    });

    // Smiley face shows face-surprised on mousedown over hidden cell
    el.addEventListener('mousedown', () => {
      if (!gameOver && !cells[i].revealed && !cells[i].flagged) {
        smileyBtn.textContent = '😮';
      }
    });
    el.addEventListener('mouseup', () => {
      if (!gameOver) smileyBtn.textContent = '😊';
    });

    cellEls.push(el);
    boardEl.appendChild(el);
  }

  // Update board wrap size for overlay positioning
  const boardPad = 8 * 2 + 2 * (cols - 1); // 2px gap * (cols-1) approx
  // actual size set by grid, overlay uses position:absolute inset:0 so auto-matches

  boardGenerated = false;
  gameOver  = false;
  gameWon   = false;
  flagMode  = false;
  flagBtn.classList.remove('active');
  flagBtn.textContent = '🚩 깃발';
  firstClick = true;
  mineCount  = mines;
  resetTimer();
  smileyBtn.textContent = '😊';
  updateLCD();
}

// ── Restart helpers ───────────────────────────────────────────
function restartSame() {
  OV.style.display = 'none';
  buildBoard();
}

function changeDiff() {
  OV.style.display = 'flex';
  showDiffScreen();
}

// ── Overlays ──────────────────────────────────────────────────
function showDiffScreen() {
  OV.style.display = 'flex';
  OV.innerHTML = `
    <div class="ov-title">지뢰찾기</div>
    <div class="ov-sub">난이도를 선택하세요</div>
    <div class="diff-list">
      <button class="diff-btn d-easy" onclick="pickDiff('easy')">
        <div class="diff-dot"></div>
        <div class="diff-txt">
          <div class="diff-name">초급</div>
          <div class="diff-desc">9×9 · 지뢰 10개</div>
        </div>
      </button>
      <button class="diff-btn d-mid" onclick="pickDiff('medium')">
        <div class="diff-dot"></div>
        <div class="diff-txt">
          <div class="diff-name">중급</div>
          <div class="diff-desc">12×12 · 지뢰 25개</div>
        </div>
      </button>
      <button class="diff-btn d-hard" onclick="pickDiff('hard')">
        <div class="diff-dot"></div>
        <div class="diff-txt">
          <div class="diff-name">고급</div>
          <div class="diff-desc">16×16 · 지뢰 45개</div>
        </div>
      </button>
    </div>`;
}

function pickDiff(d) {
  difficulty = d;
  cfg = CONFIGS[d];
  OV.style.display = 'none';
  buildBoard();
}

function showWinOverlay() {
  const prevBest = localStorage.getItem(cfg.lsKey);
  const isBest   = prevBest && parseInt(prevBest) === elapsedSec;
  OV.style.display = 'flex';
  OV.innerHTML = `
    <div class="ov-title">클리어!</div>
    <div class="ov-badge c-win">🎉 성공</div>
    <div class="ov-stats">
      클리어 시간: <strong style="color:#fff">${elapsedSec}초</strong><br>
      ${prevBest
        ? `최고 기록: <span class="ov-best">${prevBest}초${isBest ? ' 🏆 신기록!' : ''}</span>`
        : `최고 기록: <span class="ov-best">${elapsedSec}초 🏆</span>`
      }
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      <button class="btn btn-g" onclick="restartSame()">같은 난이도로</button>
      <button class="btn btn-sm" onclick="changeDiff()">난이도 변경</button>
    </div>`;
}

function showLoseOverlay() {
  OV.style.display = 'flex';
  OV.innerHTML = `
    <div class="ov-title">게임 오버</div>
    <div class="ov-badge c-lose">💥 실패</div>
    <div class="ov-stats">
      지뢰를 밟았습니다<br>
      경과 시간: <strong style="color:#fff">${elapsedSec}초</strong>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      <button class="btn btn-g" onclick="restartSame()">같은 난이도로</button>
      <button class="btn btn-sm" onclick="changeDiff()">난이도 변경</button>
    </div>`;
}

// ── Init ──────────────────────────────────────────────────────
showDiffScreen();
</script>
</body>
</html>
