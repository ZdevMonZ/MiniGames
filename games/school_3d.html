<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D School Building</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }
    #info {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.55); color: #fff; padding: 8px 20px;
      border-radius: 20px; font-size: 13px; backdrop-filter: blur(6px);
      pointer-events: none; white-space: nowrap;
    }
    #controls-hint {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.45); color: #ccc; padding: 6px 16px;
      border-radius: 14px; font-size: 12px; backdrop-filter: blur(4px);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="info">3D School Building — Three.js</div>
  <div id="controls-hint">마우스 드래그: 회전 &nbsp;|&nbsp; 스크롤: 줌 &nbsp;|&nbsp; 우클릭 드래그: 이동</div>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  } }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ── Renderer ────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.15;
    document.body.appendChild(renderer.domElement);

    // ── Scene & Camera ───────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.FogExp2(0x87ceeb, 0.006);

    const camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.1, 600);
    camera.position.set(55, 30, 75);
    camera.lookAt(0, 5, 25);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.minDistance = 10;
    controls.maxDistance = 180;
    controls.maxPolarAngle = Math.PI / 2.08;
    controls.target.set(0, 5, 25);

    // ── Lighting ─────────────────────────────────────────────────────────────
    const ambient = new THREE.AmbientLight(0xfff5e0, 0.65);
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xfff0cc, 2.4);
    sun.position.set(50, 80, 40);
    sun.castShadow = true;
    sun.shadow.mapSize.set(4096, 4096);
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 300;
    sun.shadow.camera.left  = -90;
    sun.shadow.camera.right =  90;
    sun.shadow.camera.top   =  90;
    sun.shadow.camera.bottom = -90;
    sun.shadow.bias = -0.0008;
    scene.add(sun);

    const fill = new THREE.DirectionalLight(0xc8e0ff, 0.5);
    fill.position.set(-40, 25, -20);
    scene.add(fill);

    // ── Material library ──────────────────────────────────────────────────────
    const M = {
      wall   : new THREE.MeshStandardMaterial({ color: 0xf2e2c0, roughness: 0.82 }),
      wall2  : new THREE.MeshStandardMaterial({ color: 0xe4d0a0, roughness: 0.82 }),
      roof   : new THREE.MeshStandardMaterial({ color: 0x4e6f96, roughness: 0.65, metalness: 0.05 }),
      trim   : new THREE.MeshStandardMaterial({ color: 0xcfaa80, roughness: 0.88 }),
      win    : new THREE.MeshStandardMaterial({ color: 0x90c8f8, roughness: 0.04, metalness: 0.15, transparent: true, opacity: 0.78 }),
      frame  : new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.55 }),
      door   : new THREE.MeshStandardMaterial({ color: 0x4a3010, roughness: 0.78, metalness: 0.05 }),
      ground : new THREE.MeshStandardMaterial({ color: 0x6fa83a, roughness: 1.0 }),
      dirt   : new THREE.MeshStandardMaterial({ color: 0xc8a870, roughness: 1.0 }),
      dirtDark: new THREE.MeshStandardMaterial({ color: 0xb8956a, roughness: 1.0 }),
      path   : new THREE.MeshStandardMaterial({ color: 0xc0aa88, roughness: 0.95 }),
      concrete: new THREE.MeshStandardMaterial({ color: 0xb8b0a0, roughness: 0.9 }),
      fence  : new THREE.MeshStandardMaterial({ color: 0xe0e0e0, roughness: 0.55, metalness: 0.12 }),
      flagRed: new THREE.MeshStandardMaterial({ color: 0xe63946, roughness: 0.7, side: THREE.DoubleSide }),
      flagBlue: new THREE.MeshStandardMaterial({ color: 0x2255cc, roughness: 0.7, side: THREE.DoubleSide }),
      pole   : new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.35, metalness: 0.65 }),
      goalNet: new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8, wireframe: true }),
      goalPost: new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.3, metalness: 0.6 }),
      soccer1: new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.6 }),
      soccer2: new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.6 }),
      tree   : new THREE.MeshStandardMaterial({ color: 0x287a28, roughness: 1.0 }),
      tree2  : new THREE.MeshStandardMaterial({ color: 0x1f6020, roughness: 1.0 }),
      trunk  : new THREE.MeshStandardMaterial({ color: 0x7a4a25, roughness: 1.0 }),
      steps  : new THREE.MeshStandardMaterial({ color: 0xb8a898, roughness: 0.9 }),
      sign   : new THREE.MeshStandardMaterial({ color: 0x1a4488, roughness: 0.55 }),
      white  : new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.7 }),
      lineW  : new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8 }),
      track  : new THREE.MeshStandardMaterial({ color: 0xd4aa6a, roughness: 1.0 }),
    };

    // ── Primitive helpers ─────────────────────────────────────────────────────
    function box(w, h, d, mat, x, y, z, ry = 0) {
      const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
      m.position.set(x, y, z);
      m.rotation.y = ry;
      m.castShadow = true; m.receiveShadow = true;
      scene.add(m); return m;
    }
    function cyl(rT, rB, h, seg, mat, x, y, z, ry = 0) {
      const m = new THREE.Mesh(new THREE.CylinderGeometry(rT, rB, h, seg), mat);
      m.position.set(x, y, z);
      m.rotation.y = ry;
      m.castShadow = true; m.receiveShadow = true;
      scene.add(m); return m;
    }
    function cone(r, h, seg, mat, x, y, z, ry = 0) {
      const m = new THREE.Mesh(new THREE.ConeGeometry(r, h, seg), mat);
      m.position.set(x, y, z);
      m.rotation.y = ry;
      m.castShadow = true; m.receiveShadow = true;
      scene.add(m); return m;
    }
    function disc(r, mat, x, y, z) {
      const m = new THREE.Mesh(new THREE.CircleGeometry(r, 64), mat);
      m.rotation.x = -Math.PI / 2;
      m.position.set(x, y, z);
      m.receiveShadow = true;
      scene.add(m); return m;
    }
    function ring(iR, oR, mat, x, y, z) {
      const m = new THREE.Mesh(new THREE.RingGeometry(iR, oR, 64), mat);
      m.rotation.x = -Math.PI / 2;
      m.position.set(x, y, z);
      m.receiveShadow = true;
      scene.add(m); return m;
    }

    // ══════════════════════════════════════════════════════════════════════════
    //  GROUND
    // ══════════════════════════════════════════════════════════════════════════
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), M.ground);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // ══════════════════════════════════════════════════════════════════════════
    //  BUILDING  (centered at x=0, z=0, front face at z=6)
    // ══════════════════════════════════════════════════════════════════════════
    const BW = 28, BH = 10, BD = 12;  // main block
    const WW = 10, WH = 7,  WD = 10;  // wing blocks
    const FRONT_Z = BD / 2;            // = 6

    // ── Main block
    box(BW, BH, BD, M.wall, 0, BH/2, 0);
    box(BW + 0.1, 0.45, BD + 0.1, M.trim, 0, 5.22, 0);   // floor stripe
    box(BW + 0.55, 0.85, BD + 0.55, M.trim, 0, BH + 0.42, 0); // parapet
    box(BW + 0.3,  0.28, BD + 0.3,  M.roof, 0, BH + 0.14, 0); // flat roof

    // ── Wings (centered at x = ±(BW/2 + WW/2) = ±19, z = 1)
    const LX = -(BW/2 + WW/2), RX = (BW/2 + WW/2);
    const WZ = 1;
    [-1, 1].forEach(side => {
      const wx = side * (BW/2 + WW/2);
      box(WW, WH, WD, M.wall2, wx, WH/2, WZ);
      box(WW + 0.3, 0.85, WD + 0.3, M.trim, wx, WH + 0.42, WZ);
      box(WW + 0.15, 0.25, WD + 0.15, M.roof, wx, WH + 0.12, WZ);
    });

    // ── Main block front windows  (5 per floor — x within ±11.5 safely inside ±14)
    const WIN_XS = [-10, -5, 0, 5, 10];
    function addWindow(x, y, z, ww = 2.2, wh = 2.2, axis = 'z', sign = 1) {
      const offset = 0.07;
      if (axis === 'z') {
        box(ww, wh, 0.13, M.win,   x, y, z + sign * offset);
        box(ww + 0.45, wh + 0.45, 0.09, M.frame, x, y, z + sign * offset * 0.5);
        box(0.09, wh, 0.15, M.frame, x, y, z + sign * offset * 1.5);
        box(ww, 0.09, 0.15, M.frame, x, y, z + sign * offset * 1.5);
      } else {
        box(0.13, wh, ww, M.win,   x + sign * offset, y, z);
        box(0.09, wh + 0.45, ww + 0.45, M.frame, x + sign * offset * 0.5, y, z);
        box(0.15, wh, 0.09, M.frame, x + sign * offset * 1.5, y, z);
        box(0.15, 0.09, ww, M.frame, x + sign * offset * 1.5, y, z);
      }
    }
    WIN_XS.forEach(x => {
      addWindow(x, 2.8,  FRONT_Z, 2.2, 2.2, 'z',  1);
      addWindow(x, 7.8,  FRONT_Z, 2.2, 2.2, 'z',  1);
      addWindow(x, 2.8, -FRONT_Z, 2.2, 2.2, 'z', -1);
      addWindow(x, 7.8, -FRONT_Z, 2.2, 2.2, 'z', -1);
    });

    // ── Wing front windows  (3 per wing — within ±5 of wing center)
    const WING_WIN_DX = [-3, 0, 3];
    [-1, 1].forEach(side => {
      const wx = side * (BW/2 + WW/2);
      WING_WIN_DX.forEach(dx => {
        addWindow(wx + dx, 3.5, WZ + WD/2, 2.0, 2.0, 'z', 1);
      });
    });

    // ── Wing side windows (facing outward)
    [-1, 1].forEach(side => {
      const wx = side * (BW/2 + WW/2);
      [2.5, 7.5].forEach(y => {
        addWindow(wx, y, WZ, 2.0, 2.0, 'x', side);
      });
    });

    // ── Entrance canopy & doors
    box(7.2, 0.28, 4.0, M.roof,   0, 4.28, FRONT_Z + 2.0);
    box(0.32, 4.28, 0.32, M.trim, -3.3, 2.14, FRONT_Z + 3.85);
    box(0.32, 4.28, 0.32, M.trim,  3.3, 2.14, FRONT_Z + 3.85);
    box(1.55, 3.6, 0.1, M.door, -0.85, 1.8, FRONT_Z + 0.07);
    box(1.55, 3.6, 0.1, M.door,  0.85, 1.8, FRONT_Z + 0.07);
    box(3.6,  3.9, 0.08, M.frame, 0, 1.95, FRONT_Z + 0.04);
    // Door knobs
    box(0.13, 0.13, 0.13, M.pole, -0.18, 1.8, FRONT_Z + 0.14);
    box(0.13, 0.13, 0.13, M.pole,  0.18, 1.8, FRONT_Z + 0.14);

    // Steps (3 treads)
    box(5.2, 0.22, 1.3, M.steps, 0, 0.11, FRONT_Z + 0.65);
    box(4.7, 0.22, 1.3, M.steps, 0, 0.33, FRONT_Z + 1.95);
    box(4.2, 0.22, 1.1, M.steps, 0, 0.55, FRONT_Z + 3.1);

    // ── School sign board
    box(6.0, 0.9, 0.18, M.sign, 0, 9.2, FRONT_Z + 0.05);

    // ── Clock tower
    box(3.6, 4.2, 3.6, M.wall, 0, BH + 2.1, 0);
    box(3.9, 0.45, 3.9, M.trim, 0, BH + 4.42, 0);
    const pRoof = new THREE.Mesh(new THREE.ConeGeometry(2.6, 2.2, 4), M.roof);
    pRoof.rotation.y = Math.PI / 4;
    pRoof.position.set(0, BH + 5.75, 0);
    pRoof.castShadow = true;
    scene.add(pRoof);

    // Clock face (front side of tower)
    const clockFace = new THREE.Mesh(new THREE.CircleGeometry(0.95, 32),
      new THREE.MeshStandardMaterial({ color: 0xfff8f0, roughness: 0.4 }));
    clockFace.position.set(0, BH + 2.2, 1.82);
    scene.add(clockFace);
    const handMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
    const minuteHand = new THREE.Mesh(new THREE.BoxGeometry(0.045, 0.78, 0.045), handMat);
    const hourHand   = new THREE.Mesh(new THREE.BoxGeometry(0.065, 0.54, 0.045), handMat);
    minuteHand.position.set(0, BH + 2.2, 1.9);
    hourHand.position.set(0, BH + 2.2, 1.9);
    scene.add(minuteHand); scene.add(hourHand);

    // ── Accent chimneys
    [8.5, -8.5].forEach(x => {
      box(1.3, 2.2, 1.3, M.trim, x, BH + 1.1, 0);
      box(1.0, 0.55, 1.0, M.roof, x, BH + 2.37, 0);
    });

    // ══════════════════════════════════════════════════════════════════════════
    //  SCHOOLYARD  (concrete pad in front of building)
    // ══════════════════════════════════════════════════════════════════════════
    box(38, 0.09, 18, M.concrete, 0, 0.045, FRONT_Z + 9);

    // Entrance path to gate
    box(5.0, 0.07, 14, M.path, 0, 0.035, FRONT_Z + 18 + 7);

    // ── Flagpole
    cyl(0.06, 0.06, 10, 10, M.pole, -13, 5.0, FRONT_Z + 6);
    const flagGeo = new THREE.PlaneGeometry(2.0, 1.1, 12, 1);
    const flag = new THREE.Mesh(flagGeo, M.flagRed);
    flag.position.set(-12.0, 9.7, FRONT_Z + 6);
    scene.add(flag);

    // ── Gate / fence
    const FENCE_Z   = FRONT_Z + 35;
    const FENCE_W   = 54;
    for (let x = -FENCE_W/2; x <= FENCE_W/2; x += 2.2) {
      if (Math.abs(x) > 3.5) box(0.16, 1.3, 0.16, M.fence, x, 0.65, FENCE_Z);
    }
    box(FENCE_W + 0.1, 0.1, 0.1, M.fence, 0, 1.1, FENCE_Z);
    box(FENCE_W + 0.1, 0.1, 0.1, M.fence, 0, 0.5, FENCE_Z);
    for (const side of [-1, 1]) {
      const sx = side * FENCE_W / 2;
      for (let z = FRONT_Z - 12; z <= FENCE_Z; z += 2.2)
        box(0.16, 1.3, 0.16, M.fence, sx, 0.65, z);
      box(0.1, 0.1, FENCE_Z - FRONT_Z + 14, M.fence, sx, 1.1, (FRONT_Z - 12 + FENCE_Z) / 2);
      box(0.1, 0.1, FENCE_Z - FRONT_Z + 14, M.fence, sx, 0.5, (FRONT_Z - 12 + FENCE_Z) / 2);
    }

    // ══════════════════════════════════════════════════════════════════════════
    //  CIRCULAR DIRT PLAYGROUND  (운동장)
    // ══════════════════════════════════════════════════════════════════════════
    const FIELD_CZ = FRONT_Z + 62;   // center Z of the playground

    // Outer dirt oval (approximated with large ellipse via scaled cylinder)
    const dirtOval = new THREE.Mesh(new THREE.CylinderGeometry(28, 28, 0.05, 80), M.dirt);
    dirtOval.scale.z = 0.75;    // squash into oval shape
    dirtOval.position.set(0, 0.025, FIELD_CZ);
    dirtOval.receiveShadow = true;
    scene.add(dirtOval);

    // Inner grass pitch
    const grassOval = new THREE.Mesh(new THREE.CylinderGeometry(19, 19, 0.06, 80), M.ground);
    grassOval.scale.z = 0.72;
    grassOval.position.set(0, 0.03, FIELD_CZ);
    grassOval.receiveShadow = true;
    scene.add(grassOval);

    // Running track lane lines (white rings on dirt)
    const trackMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.7 });
    [20, 23, 26].forEach(r => {
      const trackLine = new THREE.Mesh(new THREE.TorusGeometry(r, 0.09, 6, 80), trackMat);
      trackLine.rotation.x = Math.PI / 2;
      trackLine.scale.z = 0.75;
      trackLine.position.set(0, 0.08, FIELD_CZ);
      scene.add(trackLine);
    });

    // ── Soccer field markings ─────────────────────────────────────────────────
    const FW = 30, FH = 20;   // field width / half-length

    // Touchlines (long sides)
    box(0.18, 0.04, FH * 2, M.lineW, -FW/2, 0.08, FIELD_CZ);
    box(0.18, 0.04, FH * 2, M.lineW,  FW/2, 0.08, FIELD_CZ);
    // Goal lines (short sides)
    box(FW, 0.04, 0.18, M.lineW, 0, 0.08, FIELD_CZ - FH);
    box(FW, 0.04, 0.18, M.lineW, 0, 0.08, FIELD_CZ + FH);
    // Halfway line
    box(FW, 0.04, 0.18, M.lineW, 0, 0.08, FIELD_CZ);
    // Center circle
    const centerCircle = new THREE.Mesh(new THREE.TorusGeometry(4.5, 0.1, 6, 60), trackMat);
    centerCircle.rotation.x = Math.PI / 2;
    centerCircle.position.set(0, 0.09, FIELD_CZ);
    scene.add(centerCircle);
    // Center spot
    const centerSpot = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.05, 16), trackMat);
    centerSpot.position.set(0, 0.09, FIELD_CZ);
    scene.add(centerSpot);
    // Penalty areas
    [-1, 1].forEach(side => {
      const gz = FIELD_CZ + side * FH;
      const paW = 15, paD = 5;
      box(paW, 0.04, 0.18, M.lineW, 0, 0.09, gz - side * paD);
      box(0.18, 0.04, paD, M.lineW, -paW/2, 0.09, gz - side * paD/2);
      box(0.18, 0.04, paD, M.lineW,  paW/2, 0.09, gz - side * paD/2);
    });

    // ── Soccer Goals ──────────────────────────────────────────────────────────
    function addGoal(cx, cz, facingDir) {
      // facingDir: +1 = goal opens toward +z, -1 = opens toward -z
      const GW = 6, GH = 2.5, GD = 2.0;
      const gp = M.goalPost;

      // Posts
      box(0.14, GH, 0.14, gp, cx - GW/2, GH/2, cz);
      box(0.14, GH, 0.14, gp, cx + GW/2, GH/2, cz);
      // Crossbar
      box(GW + 0.14, 0.14, 0.14, gp, cx, GH, cz);
      // Back bar + side bars
      box(GW + 0.14, 0.14, 0.14, gp, cx, GH, cz - facingDir * GD);
      box(0.14, GH, 0.14, gp, cx - GW/2, GH/2, cz - facingDir * GD);
      box(0.14, GH, 0.14, gp, cx + GW/2, GH/2, cz - facingDir * GD);
      // Diagonal back support bars
      box(0.1, 0.1, GD * 1.05, gp, cx - GW/2 + 0.1, GH - 0.1, cz - facingDir * GD/2, 0);
      box(0.1, 0.1, GD * 1.05, gp, cx + GW/2 - 0.1, GH - 0.1, cz - facingDir * GD/2, 0);

      // Net (wireframe box)
      const netGeo = new THREE.BoxGeometry(GW, GH, GD);
      const net = new THREE.Mesh(netGeo, M.goalNet);
      net.position.set(cx, GH/2, cz - facingDir * GD/2);
      scene.add(net);
    }
    addGoal(0, FIELD_CZ - FH,  1);   // near goal  (opens +z)
    addGoal(0, FIELD_CZ + FH, -1);   // far goal   (opens -z)

    // ── Soccer Ball ───────────────────────────────────────────────────────────
    // Sphere with black pentagon patches via icosahedron
    const ballGroup = new THREE.Group();
    const ballBody = new THREE.Mesh(new THREE.SphereGeometry(0.55, 32, 32), M.soccer1);
    ballBody.castShadow = true;
    ballGroup.add(ballBody);
    // Fake black panel patches (small dark spheres on surface)
    for (let i = 0; i < 12; i++) {
      const phi   = Math.acos(-1 + (2 * i) / 12);
      const theta = Math.sqrt(12 * Math.PI) * phi;
      const patch = new THREE.Mesh(new THREE.SphereGeometry(0.18, 5, 4), M.soccer2);
      patch.position.setFromSphericalCoords(0.46, phi, theta);
      ballGroup.add(patch);
    }
    ballGroup.position.set(6, 0.56, FIELD_CZ - 8);
    scene.add(ballGroup);

    // ── Benches around playground ─────────────────────────────────────────────
    function bench(x, z, ry = 0) {
      const g = new THREE.Group();
      const seat = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.13, 0.52), M.trim);
      seat.position.y = 0.52; seat.castShadow = true; g.add(seat);
      [-0.95, 0.95].forEach(dx => {
        const leg = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.52, 0.52), M.trunk);
        leg.position.set(dx, 0.26, 0); leg.castShadow = true; g.add(leg);
      });
      // Backrest
      const back = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.55, 0.1), M.trim);
      back.position.set(0, 0.92, -0.22); back.castShadow = true; g.add(back);
      g.position.set(x, 0, z); g.rotation.y = ry;
      scene.add(g);
    }
    bench(-8, FRONT_Z + 8);
    bench( 8, FRONT_Z + 8);
    bench(-15, FRONT_Z + 5, Math.PI/2);
    bench( 15, FRONT_Z + 5, Math.PI/2);
    // Benches around field
    bench(-30, FIELD_CZ - 12, Math.PI/2);
    bench(-30, FIELD_CZ,      Math.PI/2);
    bench(-30, FIELD_CZ + 12, Math.PI/2);
    bench( 30, FIELD_CZ - 12, -Math.PI/2);
    bench( 30, FIELD_CZ,      -Math.PI/2);
    bench( 30, FIELD_CZ + 12, -Math.PI/2);

    // ── Trees ────────────────────────────────────────────────────────────────
    function addTree(x, z, s = 1) {
      cyl(0.18*s, 0.24*s, 1.4*s, 7, M.trunk, x, 0.7*s, z);
      cone(1.2*s, 2.4*s, 9, M.tree,  x, 2.5*s, z);
      cone(1.0*s, 2.1*s, 9, M.tree2, x, 3.7*s, z);
      cone(0.65*s,1.6*s, 9, M.tree,  x, 4.8*s, z);
    }
    // Alongside building
    addTree(-25, -3); addTree(-23,  3); addTree(-25,  9);
    addTree( 25, -3); addTree( 23,  3); addTree( 25,  9);
    // Near fence entrance
    addTree(-18, FRONT_Z + 33); addTree(18, FRONT_Z + 33);
    // Behind playground
    for (let x = -35; x <= 35; x += 8)
      addTree(x, FIELD_CZ + 33, 0.85);
    // Sides of playground
    addTree(-30, FIELD_CZ - 22); addTree(30, FIELD_CZ - 22);
    addTree(-30, FIELD_CZ + 22); addTree(30, FIELD_CZ + 22);

    // ── Flower beds ──────────────────────────────────────────────────────────
    const fMats = [
      new THREE.MeshStandardMaterial({ color: 0xff5599, roughness: 1 }),
      new THREE.MeshStandardMaterial({ color: 0xffcc00, roughness: 1 }),
      new THREE.MeshStandardMaterial({ color: 0xff8800, roughness: 1 }),
    ];
    const stemMat = new THREE.MeshStandardMaterial({ color: 0x228822 });
    function addFlowers(cx, cz, n = 7) {
      for (let i = 0; i < n; i++) {
        const a = (i / n) * Math.PI * 2;
        const r = 0.5 + Math.random() * 0.35;
        const fx = cx + Math.cos(a) * r, fz = cz + Math.sin(a) * r;
        cone(0.13, 0.28, 5, fMats[i % 3], fx, 0.14, fz);
        cyl(0.03, 0.03, 0.22, 5, stemMat, fx, 0.11, fz);
      }
    }
    addFlowers( 4, FRONT_Z + 7);
    addFlowers(-4, FRONT_Z + 7);
    addFlowers(12, FRONT_Z + 7);
    addFlowers(-12, FRONT_Z + 7);

    // ── Basketball hoop ───────────────────────────────────────────────────────
    cyl(0.07, 0.07, 3.5, 8, M.pole, -20, 1.75, FRONT_Z + 4);
    box(0.07, 0.9, 0.07, M.pole, -20, 3.7, FRONT_Z + 4.4);
    box(1.35, 1.05, 0.09, M.frame, -20, 3.9, FRONT_Z + 4.85);
    const rimG = new THREE.TorusGeometry(0.28, 0.028, 8, 28);
    const rim  = new THREE.Mesh(rimG, new THREE.MeshStandardMaterial({ color: 0xff6600, roughness: 0.4, metalness: 0.3 }));
    rim.rotation.x = Math.PI / 2;
    rim.position.set(-20, 3.4, FRONT_Z + 4.72);
    rim.castShadow = true;
    scene.add(rim);

    // ── Clouds ────────────────────────────────────────────────────────────────
    const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1.0, transparent: true, opacity: 0.9 });
    const clouds = [];
    function addCloud(x, y, z, s = 1) {
      const g = new THREE.Group();
      [[0,0,0,2.0,1.3,2.0],[1.8,0.4,0,1.5,1.1,1.5],[-1.5,0.3,0,1.4,1.0,1.4],
       [0.7,0.7,0.8,1.1,0.9,1.1],[-0.5,0.6,-0.5,0.9,0.8,0.9]].forEach(([cx,cy,cz,w,h,d]) => {
        const m = new THREE.Mesh(new THREE.SphereGeometry(1, 8, 6), cloudMat);
        m.scale.set(w*s*0.5, h*s*0.5, d*s*0.5);
        m.position.set(cx*s, cy*s, cz*s);
        g.add(m);
      });
      g.position.set(x, y, z);
      scene.add(g);
      clouds.push(g);
    }
    addCloud(-40, 32, -20, 1.3);
    addCloud( 30, 36, -35, 1.6);
    addCloud( 60, 28,  10, 1.1);
    addCloud(-60, 34,  30, 1.4);
    addCloud(  0, 40, -55, 1.2);
    addCloud( 20, 30,  80, 1.0);

    // ══════════════════════════════════════════════════════════════════════════
    //  CHARACTERS
    // ══════════════════════════════════════════════════════════════════════════

    /**
     * createCharacter({ S, bodyColor, legColor, shoeColor, hairColor, skinColor, isTeacher })
     * Returns { root, leftArm, rightArm, leftLeg, rightLeg }
     * All geometry sizes AND position values are pre-multiplied by S so the
     * character scales uniformly.  S=1.0 ≈ adult (2.19 units tall).
     */
    function createCharacter({ S=1.0, bodyColor=0x336699, legColor=0x222244,
                                shoeColor=0x1a1a1a, hairColor=0x1a1008,
                                skinColor=0xf2c090, isTeacher=false }) {
      const mSkin = new THREE.MeshStandardMaterial({ color: skinColor, roughness: 0.8 });
      const mHair = new THREE.MeshStandardMaterial({ color: hairColor, roughness: 0.9 });
      const mBody = new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.74 });
      const mPant = new THREE.MeshStandardMaterial({ color: legColor,  roughness: 0.74 });
      const mShoe = new THREE.MeshStandardMaterial({ color: shoeColor, roughness: 0.6 });

      const root = new THREE.Group();

      // Helper: create mesh and add to a parent
      function mk(geo, mat, px, py, pz, parent = root) {
        const m = new THREE.Mesh(geo, mat);
        m.position.set(px * S, py * S, pz * S);
        m.castShadow = true; m.receiveShadow = true;
        parent.add(m); return m;
      }

      // ── Torso ──────────────────────────────────────────────────────────────
      mk(new THREE.BoxGeometry(0.46*S, 0.60*S, 0.24*S), mBody, 0, 1.22, 0);

      // Teacher tie
      if (isTeacher) {
        mk(new THREE.BoxGeometry(0.10*S, 0.22*S, 0.13*S),
           new THREE.MeshStandardMaterial({ color: 0xcc1111, roughness: 0.7 }), 0, 1.43, 0.13);
      }

      // ── Arms (pivot group at shoulder) ────────────────────────────────────
      const leftArm  = new THREE.Group();
      const rightArm = new THREE.Group();
      leftArm.position.set( 0.29*S, 1.52*S, 0);
      rightArm.position.set(-0.29*S, 1.52*S, 0);
      function buildArm(grp) {
        const ua = new THREE.Mesh(new THREE.CylinderGeometry(0.075*S, 0.065*S, 0.40*S, 8), mBody);
        ua.position.y = -0.20*S; ua.castShadow = true; grp.add(ua);
        const fa = new THREE.Mesh(new THREE.CylinderGeometry(0.060*S, 0.055*S, 0.36*S, 8), mSkin);
        fa.position.y = -0.58*S; fa.castShadow = true; grp.add(fa);
        const hd = new THREE.Mesh(new THREE.SphereGeometry(0.072*S, 7, 5), mSkin);
        hd.position.y = -0.80*S; hd.castShadow = true; grp.add(hd);
      }
      buildArm(leftArm); buildArm(rightArm);
      root.add(leftArm); root.add(rightArm);

      // ── Legs (pivot group at hip) ─────────────────────────────────────────
      // Hip pivot at y = 0.92*S (world when root.y=0).
      // Shoe bottom = hip_y + shoe_local_y − shoe_half_h
      //             = 0.92 − 0.875 − 0.045 = 0  ✓ (foot on ground)
      const leftLeg  = new THREE.Group();
      const rightLeg = new THREE.Group();
      leftLeg.position.set( 0.13*S, 0.92*S, 0);
      rightLeg.position.set(-0.13*S, 0.92*S, 0);
      function buildLeg(grp) {
        const th = new THREE.Mesh(new THREE.CylinderGeometry(0.10*S, 0.09*S, 0.44*S, 8), mPant);
        th.position.y = -0.22*S; th.castShadow = true; grp.add(th);
        const sh = new THREE.Mesh(new THREE.CylinderGeometry(0.08*S, 0.07*S, 0.42*S, 8), mPant);
        sh.position.y = -0.64*S; sh.castShadow = true; grp.add(sh);
        const sk = new THREE.Mesh(new THREE.BoxGeometry(0.16*S, 0.09*S, 0.26*S), mShoe);
        sk.position.set(0.01*S, -0.875*S, 0.04*S); sk.castShadow = true; grp.add(sk);
      }
      buildLeg(leftLeg); buildLeg(rightLeg);
      root.add(leftLeg); root.add(rightLeg);

      // ── Neck (fixed, not part of head group) ────────────────────────────────
      mk(new THREE.CylinderGeometry(0.09*S, 0.10*S, 0.14*S, 8), mSkin, 0, 1.64, 0);

      // ── Head group (pivot at head-sphere center for nod animation) ───────────
      const headGroup = new THREE.Group();
      headGroup.position.set(0, 1.94*S, 0);
      root.add(headGroup);
      // mkH: position relative to headGroup origin (= head sphere center)
      function mkH(geo, mat, px, py, pz) {
        const m = new THREE.Mesh(geo, mat);
        m.position.set(px*S, py*S, pz*S);
        m.castShadow = true;
        headGroup.add(m);
        return m;
      }
      mkH(new THREE.SphereGeometry(0.23*S, 14, 10), mSkin, 0, 0, 0);
      mkH(new THREE.SphereGeometry(0.245*S, 14, 8, 0, Math.PI*2, 0, Math.PI*0.55),
          mHair, 0, 0.02, 0);
      const eyeMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
      mkH(new THREE.SphereGeometry(0.038*S, 6, 5), eyeMat,  0.09, 0.02, 0.21);
      mkH(new THREE.SphereGeometry(0.038*S, 6, 5), eyeMat, -0.09, 0.02, 0.21);

      if (isTeacher) {
        const gMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.7, roughness: 0.3 });
        const tg = new THREE.TorusGeometry(0.074*S, 0.013*S, 5, 14);
        mkH(tg, gMat,  0.09, 0.02, 0.225);
        mkH(tg, gMat, -0.09, 0.02, 0.225);
        mkH(new THREE.BoxGeometry(0.055*S, 0.012*S, 0.006*S), gMat, 0, 0.02, 0.223);
      }

      scene.add(root);
      return { root, leftArm, rightArm, leftLeg, rightLeg, headGroup };
    }

    // ── Three students on the playground ─────────────────────────────────────
    const students = [
      createCharacter({ S:0.78, bodyColor:0x2266cc, legColor:0x11224a, hairColor:0x140c06, shoeColor:0x111111 }),
      createCharacter({ S:0.78, bodyColor:0xcc3333, legColor:0x3a1111, hairColor:0x4a2808, shoeColor:0x221100 }),
      createCharacter({ S:0.78, bodyColor:0x22aa44, legColor:0x112211, hairColor:0x080808, shoeColor:0x111111 }),
    ];
    // Triangle formation — each student faces their pass target (i+1)%3
    const TRI = [
      new THREE.Vector3(  0, 0, FIELD_CZ - 13),  // S0: top
      new THREE.Vector3(-11, 0, FIELD_CZ +  7),  // S1: bottom-left
      new THREE.Vector3( 11, 0, FIELD_CZ +  7),  // S2: bottom-right
    ];
    students.forEach((s, i) => {
      s.root.position.copy(TRI[i]);
      const next = TRI[(i + 1) % 3];
      const dx = next.x - TRI[i].x, dz = next.z - TRI[i].z;
      // rotation.y = atan2(dx,dz) makes local +Z face toward (dx,dz)
      s.root.rotation.y = Math.atan2(dx, dz);
    });

    // ── Teacher in front of building ──────────────────────────────────────────
    const teacher = createCharacter({
      S: 1.0, bodyColor: 0x1a3a6e, legColor: 0x111828,
      hairColor: 0x666660, skinColor: 0xefc090, isTeacher: true,
    });
    // Fixed position in front of building, facing the playground (+Z)
    teacher.root.position.set(2, 0, FRONT_Z + 10);
    teacher.root.rotation.y = 0;

    // ══════════════════════════════════════════════════════════════════════════
    //  FLAG ANIMATION SETUP
    // ══════════════════════════════════════════════════════════════════════════
    const flagPos  = flagGeo.attributes.position;
    const flagCnt  = flagPos.count;
    const origFlagX = Array.from({ length: flagCnt }, (_, i) => flagPos.getX(i));

    // ══════════════════════════════════════════════════════════════════════════
    //  BALL PASS STATE
    // ══════════════════════════════════════════════════════════════════════════
    const IDLE_DUR   = 1.8;               // seconds ball rests at holder's feet
    const FLIGHT_DUR = 1.0;               // seconds ball is in the air
    const CYCLE_DUR  = IDLE_DUR + FLIGHT_DUR;
    // Place ball at S0's feet to start
    const ry0 = students[0].root.rotation.y;
    ballGroup.position.set(TRI[0].x + Math.sin(ry0) * 0.8, 0.56, TRI[0].z + Math.cos(ry0) * 0.8);

    // ══════════════════════════════════════════════════════════════════════════
    //  SUN
    // ══════════════════════════════════════════════════════════════════════════
    let sunAngle = 0.8;

    // ══════════════════════════════════════════════════════════════════════════
    //  ANIMATE
    // ══════════════════════════════════════════════════════════════════════════
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // Flag wave
      for (let i = 0; i < flagCnt; i++) {
        const ox = origFlagX[i];
        flagPos.setY(i, Math.sin(ox * 2.2 + t * 3.2) * ox * 0.14);
        flagPos.setZ(i, Math.cos(ox * 1.6 + t * 2.4) * ox * 0.06);
      }
      flagGeo.attributes.position.needsUpdate = true;
      flagGeo.computeVertexNormals();

      // Clock hands (pivot at clock face center)
      const mA = -(t / 60) * Math.PI * 2;
      const hA = -(t / 720) * Math.PI * 2;
      const cy = BH + 2.2, cz = 1.82 + 0.09;
      minuteHand.position.set(Math.sin(mA) * 0.26, cy + Math.cos(mA) * 0.26, cz);
      hourHand.position.set  (Math.sin(hA) * 0.18, cy + Math.cos(hA) * 0.18, cz);
      minuteHand.rotation.z = mA;
      hourHand.rotation.z   = hA;

      // ── Ball pass state machine ──────────────────────────────────────────────
      // Cycle: IDLE_DUR (ball on ground) → FLIGHT_DUR (ball in air) → repeat
      const cycleT    = t % CYCLE_DUR;
      const holderIdx = Math.floor(t / CYCLE_DUR) % 3;
      const nextIdx   = (holderIdx + 1) % 3;
      const inFlight  = cycleT >= IDLE_DUR;
      const flightT   = inFlight ? (cycleT - IDLE_DUR) / FLIGHT_DUR : 0; // 0→1

      if (inFlight) {
        // Parabolic arc between fixed triangle corners — always visible
        ballGroup.position.set(
          THREE.MathUtils.lerp(TRI[holderIdx].x, TRI[nextIdx].x, flightT),
          0.56 + Math.sin(flightT * Math.PI) * 2.5,
          THREE.MathUtils.lerp(TRI[holderIdx].z, TRI[nextIdx].z, flightT)
        );
        ballGroup.rotation.z -= 0.10;
        ballGroup.rotation.x -= 0.07;
      } else {
        // Ball rests on ground right in front of holder
        const ry = students[holderIdx].root.rotation.y;
        ballGroup.position.set(
          TRI[holderIdx].x + Math.sin(ry) * 0.8,
          0.56,
          TRI[holderIdx].z + Math.cos(ry) * 0.8
        );
      }

      // ── Student animation ────────────────────────────────────────────────────
      students.forEach((s, i) => {
        // Default idle: arms slightly forward & out, legs straight
        let lLegX = 0, rLegX = 0;
        let lArmX = 0.10 + Math.sin(t * 0.8 + i * 1.2) * 0.04;
        let rArmX = 0.10 + Math.cos(t * 0.8 + i * 1.2) * 0.04;
        let lArmZ = 0.14, rArmZ = -0.14;

        if (i === holderIdx) {
          // Windup: last 0.4 s of IDLE — right leg swings back
          const wStart = IDLE_DUR - 0.4;
          if (!inFlight && cycleT >= wStart) {
            const wp = (cycleT - wStart) / 0.4;
            rLegX =  Math.sin(wp * Math.PI * 0.5) * 0.80;  // leg back
            rArmX = -Math.sin(wp * Math.PI * 0.5) * 0.45;  // arm forward counter
          }
          // Kick: first 30 % of flight
          if (inFlight && flightT < 0.30) {
            const kp = flightT / 0.30;
            rLegX = 0.80 - Math.sin(kp * Math.PI) * 1.55;  // back → through
            rArmX = -0.45 + Math.sin(kp * Math.PI) * 0.65;
          }
          // Follow-through return: 30–65 % of flight
          if (inFlight && flightT >= 0.30 && flightT < 0.65) {
            const fp = (flightT - 0.30) / 0.35;
            rLegX = THREE.MathUtils.lerp(-0.75, 0, fp);
            rArmX = THREE.MathUtils.lerp( 0.20, lArmX, fp);
          }
        }

        // Receiver extends arms to catch near end of flight
        if (i === nextIdx && inFlight && flightT > 0.60) {
          const cp = (flightT - 0.60) / 0.40;
          lArmX = THREE.MathUtils.lerp(0.10, -0.55, cp);
          rArmX = THREE.MathUtils.lerp(0.10, -0.55, cp);
          lArmZ = THREE.MathUtils.lerp(0.14,  0.32, cp);
          rArmZ = THREE.MathUtils.lerp(-0.14,-0.32, cp);
        }

        s.leftLeg.rotation.x  = lLegX;
        s.rightLeg.rotation.x = rLegX;
        s.leftArm.rotation.x  = lArmX;
        s.rightArm.rotation.x = rArmX;
        s.leftArm.rotation.z  = lArmZ;
        s.rightArm.rotation.z = rArmZ;
      });

      // ── Teacher: standing, waving right arm ───────────────────────────────────
      teacher.leftArm.rotation.x  =  0.10;
      teacher.leftArm.rotation.z  =  0.14;
      teacher.leftLeg.rotation.x  =  0;
      teacher.rightLeg.rotation.x =  0;
      teacher.headGroup.rotation.x = 0;
      // Right arm raised high and waves side-to-side
      teacher.rightArm.rotation.x = -2.3 + Math.sin(t * 2.8) * 0.18;
      teacher.rightArm.rotation.z =  Math.sin(t * 4.8) * 0.60;

      // ── Cloud drift ──────────────────────────────────────────────────────────
      clouds.forEach((c, i) => {
        c.position.x += 0.004 * (1 + i * 0.1);
        if (c.position.x > 120) c.position.x = -120;
      });

      // ── Sun day cycle ────────────────────────────────────────────────────────
      sunAngle += 0.00025;
      sun.position.set(Math.cos(sunAngle) * 90, Math.max(3, Math.sin(sunAngle) * 90), 40);
      const df = Math.max(0, Math.min(1, sun.position.y / 90));
      const sky = new THREE.Color().lerpColors(new THREE.Color(0xffd090), new THREE.Color(0x7ec8f0), df);
      scene.background = sky;
      scene.fog.color.copy(sky);
      sun.intensity     = 0.8 + df * 1.8;
      ambient.intensity = 0.25 + df * 0.5;

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
