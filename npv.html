<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multiple Cash Flow (NPV) Tool</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body{font-family:Arial, sans-serif;background:#f4f6fb;margin:0;padding:32px}
        .container{max-width:1000px;margin:auto}
        .card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 10px 25px rgba(0,0,0,.08);margin-bottom:20px}
        h2{margin:0 0 12px}
        .row{display:flex;gap:12px;align-items:center}
        .row input[type=number]{flex:1;padding:8px;border:1px solid #ddd;border-radius:8px}
        .btn{padding:10px 14px;border:none;border-radius:10px;cursor:pointer}
        .btn-primary{background:#4f6df5;color:#fff}
        .btn-danger{background:#ef4444;color:#fff}
        .btn-secondary{background:#e5e7eb}
        .slider{width:100%}
        .muted{color:#6b7280}
        .result{font-size:26px;font-weight:700;color:#16a34a;margin-top:10px}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
        .small{font-size:12px;color:#6b7280}
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>Multiple Cash Flow (NPV) Calculator</h2>
        <div class="muted">각 연도의 현금흐름을 입력하고 할인율을 조정하면 NPV가 자동 계산됩니다.</div>
    </div>

    <div class="card">
        <div>
            <label>Discount Rate: <b id="rateVal">10%</b></label>
            <input id="rate" class="slider" type="range" min="0" max="40" step="0.1" value="10" />
        </div>

        <div id="cfList" style="margin-top:16px"></div>

        <div class="row" style="margin-top:12px">
            <button class="btn btn-primary" onclick="addYear()">+ Year 추가</button>
            <button class="btn btn-danger" onclick="removeYear()">- Year 삭제</button>
            <button class="btn btn-secondary" onclick="loadAmazon()">예시 불러오기 (Amazon)</button>
        </div>

        <div class="result" id="npvResult">NPV: $0</div>
        <div class="small" id="details"></div>
    </div>

    <div class="card">
        <h2>PV by Year</h2>
        <canvas id="chart"></canvas>
    </div>
</div>

<script>
    let cashFlows = [570, 430, 840, 1230];
    let chart;

    const rateEl = document.getElementById('rate');
    const rateVal = document.getElementById('rateVal');
    const cfList = document.getElementById('cfList');

    function format(n){return Number(n).toLocaleString(undefined,{maximumFractionDigits:0});}

    function renderCF(){
        cfList.innerHTML = '';
        cashFlows.forEach((cf, i) => {
            const row = document.createElement('div');
            row.className = 'row';
            row.innerHTML = `
      <span style="width:80px">Year ${i+1}</span>
      <input type="number" value="${cf}" oninput="updateCF(${i}, this.value)" />
    `;
            cfList.appendChild(row);
        });
    }

    function updateCF(i, v){
        cashFlows[i] = Number(v || 0);
        calculate();
    }

    function addYear(){
        cashFlows.push(0);
        renderCF();
        calculate();
    }

    function removeYear(){
        if(cashFlows.length>1){
            cashFlows.pop();
            renderCF();
            calculate();
        }
    }

    function loadAmazon(){
        cashFlows = [570, 430, 840, 1230];
        rateEl.value = 10;
        rateVal.textContent = '10%';
        renderCF();
        calculate();
    }

    function calculate(){
        const r = Number(rateEl.value)/100;
        const pvEach = cashFlows.map((cf, i) => cf / Math.pow(1+r, i+1));
        const npv = pvEach.reduce((a,b)=>a+b,0);

        document.getElementById('npvResult').textContent = 'NPV: $' + format(npv);
        document.getElementById('details').textContent = '합계는 각 연도 PV의 합입니다.';

        drawChart(pvEach);
    }

    function drawChart(pvEach){
        const labels = pvEach.map((_,i)=>'Year '+(i+1));
        if(chart) chart.destroy();
        chart = new Chart(document.getElementById('chart'),{
            type:'bar',
            data:{labels, datasets:[{label:'Present Value by Year', data:pvEach}]},
            options:{responsive:true}
        });
    }

    rateEl.addEventListener('input', ()=>{
        rateVal.textContent = rateEl.value + '%';
        calculate();
    });

    renderCF();
    calculate();
</script>
</body>
</html>
